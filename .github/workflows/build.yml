name: WhatsApp Bot

on:
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Restore saved auth session (so no QR rescan needed)
      - name: Restore auth session
        uses: actions/cache/restore@v4
        with:
          path: ./auth
          key: whatsapp-auth

      # Install Cloudflare Tunnel
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -q && sudo apt-get install -yq cloudflared

      # Start bot
      - name: Start bot
        run: npm start &
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          PREFIX: ${{ secrets.PREFIX }}

      - name: Wait for bot to be ready
        run: sleep 5

      # Start tunnel and print URL clearly
      - name: Start Cloudflare tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 --no-autoupdate > /tmp/cf.log 2>&1 &
          echo "Waiting for tunnel..."
          for i in $(seq 1 30); do
            URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo ""
              echo "========================================="
              echo "🌐 OPEN THIS TO SCAN QR: $URL"
              echo "========================================="
              break
            fi
            sleep 2
          done
          wait

      # Save auth session after bot exits (even if cancelled)
      - name: Save auth session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./auth
          key: whatsapp-auth
