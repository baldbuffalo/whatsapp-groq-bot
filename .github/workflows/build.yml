name: WhatsApp Bot

on:
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Restore saved auth session (so no QR rescan needed)
      - name: Restore auth session
        uses: actions/cache/restore@v4
        with:
          path: ./auth
          key: whatsapp-auth

      # Install ngrok
      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -q && sudo apt-get install -yq ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      # Start bot + tunnel, print the public URL, then wait
      - name: Start bot and tunnel
        run: |
          npm start &
          sleep 5
          ngrok http 3000 --log=stdout --pooling-enabled &
          sleep 5
          curl -s http://localhost:4040/api/tunnels \
            | grep -o '"public_url":"[^"]*' \
            | grep https \
            | cut -d'"' -f4 \
            | xargs -I{} echo "🌐 OPEN THIS TO SCAN QR: {}"
          wait
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          PREFIX: ${{ secrets.PREFIX }}

      # Save auth session after bot exits (even if cancelled)
      - name: Save auth session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./auth
          key: whatsapp-auth
