name: WhatsApp Bot

on:
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # CI mode: uses terminal QR (index.js), not the web server
      - run: npm run ci
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
          PREFIX: ${{ secrets.PREFIX }}
